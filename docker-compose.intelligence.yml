version: '3.8'

services:
  # Main S2A ASR Service
  s2a-api:
    build: .
    extra_hosts:
      - "host.docker.internal:172.17.0.1"
    ports:
      - "8001:8001" # API port
      - "9090:9090" # Prometheus metrics port
    volumes:
      - ./logs:/app/logs
      - /tmp/s2a:/tmp/s2a
      - /mnt/storage:/mnt/storage:ro # Mount large storage for models
    environment:
      # ASR Configuration
      - S2A_MODEL_NAME=nvidia/parakeet-tdt-0.6b-v2
      - S2A_DEVICE=cuda
      - S2A_BATCH_SIZE=8
      - S2A_MAX_CHUNK_DURATION=1440 # 24 minutes
      - S2A_MIN_AUDIO_DURATION=5.0
      - S2A_LOG_LEVEL=INFO
      - S2A_ENABLE_MIXED_PRECISION=true
      - S2A_GPU_MEMORY_FRACTION=0.4  # Reduced for vLLM coexistence
      - S2A_NUM_WORKERS=2

    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    restart: unless-stopped
    depends_on:
      vllm-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/v1/statistics/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - s2a-network

  # Redis for caching (optional but recommended)
  redis-cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - s2a-network

  # Monitoring services (optional)
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - s2a-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    networks:
      - s2a-network

networks:
  s2a-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  redis_data: