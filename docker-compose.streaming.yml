services:
  streaming-asr-triton:
    build:
      context: ./triton-service/streaming_asr_triton
      dockerfile: dockerfile
    container_name: streaming-asr-triton
    volumes:
      - ./triton-service/streaming_asr_triton/models:/models
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3902:3902"
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    networks:
      - s2a-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3900/v2/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  streaming-diar-triton:
    build:
      context: ./triton-service/streaming_diar_triton
      dockerfile: dockerfile
    container_name: streaming-diar-triton
    volumes:
      - ./triton-service/streaming_diar_triton/models:/models
    ports:
      - "4000:4000"
      - "4001:4001"
      - "4002:4002"
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    networks:
      - s2a-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/v2/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

networks:
  s2a-network:
    driver: bridge
