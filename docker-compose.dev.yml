version: "3.9"

services:
  s2a-api-dev:
    build: .
    ports:
      - "8002:8001" # API port
      - "9091:9090" # Prometheus metrics port
    volumes:
      - ./logs:/app/logs
      - /tmp/s2a:/tmp/s2a
      - .:/app # bind mount source code for hot reload
    env_file:
      - .env.dev
    environment:
      - S2A_MODEL_NAME=nvidia/parakeet-tdt-0.6b-v2
      - S2A_DEVICE=cuda
      - S2A_BATCH_SIZE=2 # smaller batch for dev
      - S2A_MAX_CHUNK_DURATION=600
      - S2A_MIN_AUDIO_DURATION=5.0
      - S2A_LOG_LEVEL=DEBUG # verbose logging
      - S2A_ENABLE_MIXED_PRECISION=false
      - S2A_GPU_MEMORY_FRACTION=0.5
      - S2A_NUM_WORKERS=1
    command: [ "sh", "-c", "prisma generate && prisma py fetch && python -m uvicorn main:app --reload --host 0.0.0.0 --port 8001" ]
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/v1/statistics/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  db-dev:
    image: postgres:15
    env_file:
      - .env.dev
    ports:
      - "5433:5432" # separate port to avoid conflicts with prod DB
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data_dev:
